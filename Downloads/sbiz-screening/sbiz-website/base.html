<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sbiz{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ url_for('home') }}">Sbiz</a>
      <nav>
        <a href="{{ url_for('home') }}" class="{{ 'active' if request.path == url_for('home') }}">Home</a>
        <a href="{{ url_for('about') }}" class="{{ 'active' if request.path == url_for('about') }}">About</a>
        <a href="{{ url_for('hr_assistant') }}" class="{{ 'active' if request.path == url_for('hr_assistant') }}">HR Assistant</a>
        <a href="{{ url_for('screening') }}" class="{{ 'active' if request.path == url_for('screening') }}">Screening Sheet</a>
      </nav>
    </div>
  </header>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="wrap flash-stack">
        {% for msg in messages %}
          <p class="flash">{{ msg }}</p>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">&copy; 2026 Sbiz</div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
